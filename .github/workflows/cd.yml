name: CD

on:
  push:
    branches: [main]

jobs:
  Deploy:
    name: Deploy
    runs-on: ubuntu-latest

    # توفير متغير البيئة DATABASE_URL لكل الخطوات
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # 1️⃣ سحب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ إعداد Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ تثبيت التبعيات
      - name: Install dependencies
        run: npm install

      # 4️⃣ بناء المشروع
      - name: Build
        run: npm run build

      # 5️⃣ تشغيل الميجريشن قبل النشر
      - name: Run database migrations
        run: npm run db:migrate

      # 6️⃣ المصادقة مع Google Cloud باستخدام السر المخزن
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # 7️⃣ إعداد Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 8️⃣ بناء صورة Docker ورفعها إلى Artifact Registry
      - name: Build and Push to Artifact Registry
        run: |
          gcloud builds submit --tag us-central1-docker.pkg.dev/notely-490519/notely-ar-repo/notely:latest .

      # 9️⃣ نشر التطبيق على Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/notely-490519/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project notely-490519 \
            --max-instances=4
